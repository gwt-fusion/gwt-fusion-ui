name: PR Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven verify
        run: mvn -Dskip.tailwind=true verify

      - name: Build UI CSS
        run: mvn -pl gwt-fusion-ui generate-resources

      - name: Compile demo
        run: mvn -Pdemo -pl gwt-fusion-ui-demo -am -Dskip.tailwind=true package
